  <body>
    <header class="menu">
      <div class="navigation-logo">
        <img class="logo" src="favicon_red.png" alt="" />
        <p>RED LANTERN DESIGN</p>
      </div>
      <div class="navigation">
        <nav>
          <ul class="navigation-links">

              <a href="formulario.html">FALE CONOSCO</a>

          </ul>
        </nav>

    <div class="hero"></div>
    <section class="section-formulario">
      <div class="section-title">
      <h1>ENTRE EM CONTATO</h1>
      </div>
      <form id="form-contato" action="enviar.php" method="post">
        <div class="campo">
          <label for="nome">Nome:</label>
          <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="campo">
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" placeholder="exemplo@email.com" required>
        </div>
        <div class="campo">
          <label for="telefone">Telefone:</label>
          <input type="text" name="telefone" id="telefone" placeholder="Seu número" required>
        </div>
        <div class="campo">
          <label for="mensagem">Mensagem: </label>
          <textarea name="mensagem" id="mensagem" placeholder="Como podemos ajudar?" required></textarea>
        </div>

       <button type="submit" id="btn-enviar">Enviar formulario</button>
      </form>
      <div id="mensagem-sucesso">
        <img src="imgs/check.png" alt="">
        <p>FORMULÁRIO ENVIADO COM SUCESSO! <span>Para mais informações entraremos em contato.</span></p>
      </div>
        
    </section>
    
    <script src="script.js" defer></script>
